# ==========================================
#      NATURAL VELOCITY - CONFIGURATION
# ==========================================

# Premium MOTD Settings
# Use &#RRGGBB for hex colors (e.g. &#00AAFF) or MiniMessage tags
[motd]
line1 = "<b><gradient:#3BAFFF:#00FF5A>NATURAL SMP</gradient></b>    &#AAAAAA• &#FFFFFFThe Most Immersive Experience"
line2 = "&#AAAAAA» &#FFFF55Join now to explore our &#FFAA00PREMIUM FEATURES!"
# Server List Customization
[server-list]
# Shown in place of player count (e.g., "NaturalSMP v1.21")
version-text = "&#00AAFFNaturalSMP v1.21.4"

# Hover Player List (Max 10-12 usually)
# Note: Gradients are discouraged in hover due to character limits
hover-lines = [
    "<b><gradient:#3BAFFF:#00FF5A>NATURAL SMP: REBORN</gradient></b>",
    "&#AAAAAA----------------------",
    "&#FFFF55Core Features:",
    " &#FFFFFF• Custom 4 Seasons &#55FFFF(Winter Active)",
    " &#FFFFFF• Dynamic Economy &#55FF55(Anti-Inflation)",
    " &#FFFFFF• Procedural Dungeons &#FF5555(New Floor!) ",
    "&#AAAAAA",
    "&#55FFFFDiscord: &#FFFFFFdc.naturalsmp.net",
    "&#FF55FFStore: &#FFFFFFstore.naturalsmp.net"
]

# Integration Settings
[integration]
# Enable synergi with NaturalCore backend
naturalcore-sync = true
maintenance-mode = true

# ==========================================
#          CORE DATABASE (MySQL)
# ==========================================
[database]
enabled = true
host = "localhost"
port = 3306
database = "naturalsmp_core"
username = "root"
password = ""

# Maintenance Mode Display
[maintenance]
motd-line1 = "<b><gradient:#FF0000:#FF8800>MAINTENANCE MODE</gradient></b>    &#AAAAAA• &#FFFFFFNatural SMP"
motd-line2 = "&#AAAAAA» &#FFFFFFServer sedang dalam tahap perbaikan rutin."
kick-reason = """
<b><gradient:#FF0000:#FF8800>NATURAL SMP MAINTENANCE</gradient></b>

&#AAAAAAServer sedang dalam perbaikan.
&#AAAAAAHanya staf yang diizinkan masuk.

&#AAAAAA» &#FFFFFFSelesai dalam beberapa saat lagi...
&#AAAAAA» &#55FFFFdc.naturalsmp.my.id
"""

# ==========================================================
# Head MOTD Configuration (ZedarMC Style Pixel Art Images)
# ==========================================================
[head-motd]
# Enable Image-based MOTD rendering
enabled = true

# MineSkin API Key (MANDATORY for Head MOTDs)
# Get a free API Key at https://mineskin.org/
mineskin-api-key = ""

# Name of the image file to use for the MOTD
# Place this file in the plugins/NaturalVelocity/ data folder
image-file = "motd.png"

# Automatically add +1 to max players online
always-plus-one = true

# Disable for Bedrock players natively to prevent visual glitches
ignore-bedrock = true

# Fallback MOTD for older versions
fallback-motd = [
    "<b><gradient:#3BAFFF:#00FF5A>NATURAL SMP</gradient></b>    &#AAAAAA• &#FFFFFFThe Most Immersive Experience",
    "&#AAAAAA» &#FFFF55Join now to explore our &#FFAA00PREMIUM FEATURES!"
]
