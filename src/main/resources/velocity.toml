# ==========================================
#      NATURAL VELOCITY v2.0 - CONFIGURATION
#         HeadPacket MOTD Integration
# ==========================================

# Premium MOTD Settings (Text-based fallback)
# Use &#RRGGBB for hex colors (e.g. &#00AAFF) or MiniMessage tags
# NOTE: When head-motd is enabled & active, this text MOTD is overridden by pixel art heads.
[motd]
enabled = true
line1 = "<b><gradient:#3BAFFF:#00FF5A>NATURAL SMP</gradient></b>    &#AAAAAA• &#FFFFFFThe Most Immersive Experience"
line2 = "&#AAAAAA» &#FFFF55SlimeFun + RPG !"

# Server List Customization
[server-list]
enabled = true
# Shown in place of player count (e.g., "NaturalSMP v1.21")
version-text = "&b1.21.4 &7- &b26.1 &7[ &f%online% &7/&f %max_player% &7]"

# Hover Player List (Max 10-12 usually)
# These are used by BOTH text MOTD and head MOTD modes.
hover-lines = [
    "<b><gradient:#3BAFFF:#00FF5A>NATURAL SMP: REBORN</gradient></b>",
    "&#AAAAAA----------------------",
    "&#FFFF55Core Features:",
    " &#FFFFFF• Custom 4 Seasons &#55FFFF(Winter Active)",
    " &#FFFFFF• Dynamic Economy &#55FF55(Anti-Inflation)",
    " &#FFFFFF• Procedural Dungeons &#FF5555(New Floor!) ",
    "&#AAAAAA",
    "&#55FFFFDiscord: &#FFFFFFdc.naturalsmp.net",
    "&#FF55FFStore: &#FFFFFFstore.naturalsmp.net"
]

# ==========================================
#     HEAD PIXEL ART MOTD (HeadPacket)
# ==========================================
# Renders an image as player heads in the MOTD!
# Requires: packetevents plugin installed on Velocity
# Usage: Run "/nv process-motd" from console to generate head textures from your image.
[head-motd]
enabled = true
# MineSkin API Key (REQUIRED for processing)
# Get a free API Key at https://mineskin.org/
mineskin-api-key = "msk_iuZFHO1D_AjtXqgIAOSTdU73DsLdoqLD_yhnBbKm29XxAxplL3R1jd-V4OtltQ3OxwahO1qaN"
# Upload delay in ms (2000 recommended for free accounts)
mineskin-delay = 2000
# Folder containing MOTD images (inside NaturalVelocity data folder)
images-folder = "images"
# Image file to use (PNG, width multiple of 8 max 264, height 8 or 16)
motd-image = [
  "motd-new.png",
  "motd-new-2.png"
]
rotatingrotating-motd-delay = 30 #in second
# Minimum protocol version for head MOTD display
# 773 = Minecraft 1.21.9, 775 = Minecraft 1.21.11
motd-minimum-protocol = 773
motd-maximum-protocol = 774
# Dynamic Slots: max players = online + 1 (e.g., 5/6, 10/11)
always-plus-one = false
# Skip head MOTD for Bedrock/MCPE players (Geyser/Floodgate)
ignore-bedrock = true
# Fallback text MOTD for clients below or above protocol range
fallback-line1 = "<b><gradient:#3BAFFF:#00FF5A>NATURAL SMP</gradient></b>    &#AAAAAA• &#FFFFFFThe Most Immersive Experience"
fallback-line2 = "&#AAAAAA» &#FFFF55SlimeFun + RPG !"

# Integration Settings
[integration]
# Enable synergi with NaturalCore backend
naturalcore-sync = true
maintenance-mode = false

# ==========================================
#          CORE DATABASE (MySQL)
# ==========================================
[database]
enabled = false
host = "localhost"
port = 3306
database = "naturalsmp_core"
username = "root"
password = ""


# Maintenance Mode Display
[maintenance]
# Head MOTD banner for maintenance (PNG, max 264x16). 
# If empty (""), normal text MOTD will be used for maintenance.
# Usage: Run "/nv process-maintenance-motd" to generate textures.
motd-image = "maintenance.png"
motd-line1 = "<b><gradient:#FF0000:#FF8800>MAINTENANCE MODE</gradient></b>    &#AAAAAA• &#FFFFFFNatural SMP"
motd-line2 = "&#AAAAAA» &#FFFFFFServer sedang dalam tahap perbaikan rutin."
kick-reason = """
<gradient:#FFAA00:#FFFF55><b>NATURAL SMP</b></gradient> <dark_gray>┃</dark_gray> <yellow><b>MAINTENANCE</b></yellow>

<gray>Server sedang dalam tahap perbaikan atau update rutin.
Hanya staf yang diizinkan masuk untuk saat ini.</gray>

<dark_gray>» <aqua>dc.naturalsmp.net</aqua></dark_gray>
"""

